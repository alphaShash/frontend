<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>AI Todo</h2>
    <ul>
      <li>Dashboard</li>
      <li>Tasks</li>
      <li>AI Planner</li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <h1>Dashboard</h1>
    </header>

    <!-- Add Todo -->
    <section class="add-section">
      <app-todo-form (todoAdded)="onTodoAdded($event)"></app-todo-form>
    </section>

    <!-- Kanban Board -->
    <section class="board">
      <div class="column">
        <h3>Todo</h3>
        <app-todo-list></app-todo-list>
      </div>

      <div class="column">
        <h3>AI Planner</h3>
        <app-ai (todosCreated)="onTodosGenerated($event)"></app-ai>
      </div>
    </section>
  </main>
</div>
